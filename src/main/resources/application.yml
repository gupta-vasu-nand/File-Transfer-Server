server:
  port: ${SERVER_PORT:9090}
  address: 0.0.0.0
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: 5m

spring:
  application:
    name: file-transfer-server
  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:1GB}
      max-request-size: ${FILE_MAX_SIZE:1GB}
      file-size-threshold: 2KB
      location: ${java.io.tmpdir}
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

# File storage configuration
file:
  # Use environment variable with Windows path fallback
  storage:
    path: ${FILE_STORAGE_PATH:C:/Users/Vasu/Downloads/Telegram Desktop}
  max-size: ${FILE_MAX_SIZE:1073741824} # 1GB in bytes
  allowed-extensions: ${ALLOWED_EXTENSIONS:*} # * for all

# Logging configuration
logging:
  level:
    root: INFO
    org.vng.filetransferserver: DEBUG
    org.springframework.web: INFO
  file:
    name: ./logs/file-transfer-server.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# OpenAPI/Swagger configuration (disable if having issues)
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true