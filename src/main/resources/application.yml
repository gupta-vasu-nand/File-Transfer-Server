server:
  port: ${SERVER_PORT:9090}
  address: 0.0.0.0
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: 5m
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: file-transfer-server
  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:1GB}
      max-request-size: ${FILE_MAX_SIZE:1GB}
      file-size-threshold: 2MB
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
      cache:
        period: 3600

file:
  storage:
    path: ${FILE_STORAGE_PATH:C:/Users/Vasu/Downloads/Telegram Desktop}
  max-size: ${FILE_MAX_SIZE:1073741824}

logging:
  level:
    root: INFO
    org.vng.filetransferserver: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/file-transfer-server.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always