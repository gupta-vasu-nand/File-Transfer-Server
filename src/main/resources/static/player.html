<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Streaming Player</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Core Brand Colors */
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;

            /* Light Theme Variables (Default) */
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --icon-bg: #eef2ff;
            --badge-bg: #f8fafc;

            /* Shadows & Geometry */
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        /* Dark Theme Variables */
        body.dark-theme {
            --bg-main: #000000;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --icon-bg: #312e81; /* Darker indigo for icons */
            --badge-bg: #0f172a;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-main);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(16px, 4vw, 40px) clamp(12px, 3vw, 24px);
        }

        /* --- Header --- */
        .header {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: clamp(24px, 4vw, 32px);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-wrapper i {
            color: var(--primary);
            width: clamp(28px, 5vw, 36px);
            height: clamp(28px, 5vw, 36px);
        }

        h1 {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-icon {
            padding: 10px;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--surface-hover);
            border-color: var(--text-muted);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* --- Panels --- */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        /* --- Inputs & Server Config --- */
        .input-group {
            display: grid;
            grid-template-columns: 1fr 120px auto auto;
            gap: 12px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        input::placeholder { color: var(--text-muted); }

        /* --- Player Section --- */
        #playerSection {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-wrapper {
            background: #000;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        video, audio {
            width: 100%;
            display: block;
        }

        video { max-height: 70vh; }

        audio {
            padding: 20px;
            background: var(--surface-hover);
        }

        /* Player Tools */
        .player-tools {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-top: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 200px;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tool-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input[type="range"] {
            flex: 1;
            padding: 0;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            outline: none;
            min-width: 100px;
            box-shadow: none;
        }

        .media-info {
            margin-top: 16px;
            padding: 20px;
            background: var(--surface-hover);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .info-row strong { color: var(--text-main); }
        .info-row a {
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .info-row a:hover { text-decoration: underline; }

        /* --- Controls Area --- */
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filters {
            display: flex;
            gap: 8px;
            background: var(--surface-hover);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 10px 20px;
            background: transparent;
            border-radius: 10px;
            color: var(--text-muted);
            box-shadow: none;
            border: none;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .filter-btn:hover { color: var(--text-main); }
        .filter-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        .search-box input {
            width: 100%;
            padding-left: 48px;
        }

        /* --- Media Grid --- */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .media-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .media-card:hover {
            transform: translateY(-6px);
            border-color: var(--text-muted);
            box-shadow: var(--shadow-lg);
        }

        .media-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: var(--icon-bg);
            border-bottom: 1px solid var(--border);
        }

        .media-icon-wrapper {
            width: 100%;
            height: 160px;
            background: var(--icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
        }

        .media-icon-wrapper i { width: 48px; height: 48px; }

        .media-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .media-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 12px;
            word-break: break-word;
            line-height: 1.4;
            flex-grow: 1;
            color: var(--text-main);
        }

        .media-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--badge-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .badge i { width: 12px; height: 12px; }

        /* --- Status & States --- */
        .status-msg {
            margin-top: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading, .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border);
        }

        .loading i {
            animation: spin 2s linear infinite;
            width: 40px;
            height: 40px;
            color: var(--primary);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Responsiveness --- */
        @media (max-width: 820px) {
            .header-top { flex-direction: column; align-items: stretch; }
            .header-actions { justify-content: flex-start; }
            .input-group { grid-template-columns: 1fr; }
            .controls-area { flex-direction: column; align-items: stretch; gap: 12px; }
            .search-box { max-width: 100%; }
        }

        @media (max-width: 540px) {
            .panel { padding: 20px; }
            .header-actions { grid-template-columns: auto 1fr auto; display: grid; }
            .media-btn { grid-column: span 3; }
            .tool-group { min-width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="title-wrapper">
                <i data-lucide="play-circle"></i>
                <h1>Media Streaming Server</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-icon" onclick="toggleTheme()" title="Toggle Theme">
                    <i data-lucide="moon" id="themeIcon"></i>
                </button>
                <a href="index.html" class="btn btn-outline media-btn" title="Back to File Manager">
                    <i data-lucide="folder"></i> File Manager
                </a>
            </div>
        </div>
        <p class="subtitle">Stream videos and audio locally from your network</p>
    </div>

    <div class="panel">
        <div class="panel-title">
            <i data-lucide="server" style="color: var(--primary);"></i>
            Server Configuration
        </div>
        <div class="input-group">
            <input type="text" id="serverIp" placeholder="Server IP (e.g., 192.168.1.5)" value="localhost">
            <input type="number" id="serverPort" placeholder="Port" value="9090" style="flex: 0 1 120px;">
            <button class="btn btn-primary" onclick="connectToServer()">
                <i data-lucide="plug"></i> Connect
            </button>
            <button class="btn btn-outline" onclick="autoDetectIp()">
                <i data-lucide="scan"></i> Auto Detect
            </button>
        </div>
        <div id="connectionStatus" class="status-msg"></div>
    </div>

    <div id="playerSection" class="panel">
        <div class="panel-title">
            <i data-lucide="monitor-play" style="color: var(--primary);"></i>
            Now Playing
        </div>

        <div class="player-wrapper" id="playerContainer"></div>

        <div class="player-tools" id="playerTools" style="display: none;">
            <div class="tool-group">
                <label for="playbackSpeed"><i data-lucide="gauge"></i> Speed</label>
                <select id="playbackSpeed" onchange="changePlaybackSpeed(this.value)">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2.0x</option>
                </select>
            </div>
            <div class="tool-group">
                <label for="audioBoost" title="Boost quiet codecs (e.g. AC3/DTS)"><i data-lucide="speaker"></i> Audio Boost</label>
                <input type="range" id="audioBoost" min="1" max="5" step="0.1" value="1" oninput="changeAudioBoost(this.value)">
                <span id="boostValue" style="font-size: 0.85rem; font-weight: 600; width: 30px;">1x</span>
            </div>
        </div>

        <div id="mediaInfo" class="media-info"></div>
    </div>

    <div id="mediaLibrary">
        <div class="controls-area">
            <div class="filters">
                <button class="filter-btn active" onclick="filterMedia('all')">
                    <i data-lucide="grid" style="width:18px; height:18px;"></i> All
                </button>
                <button class="filter-btn" onclick="filterMedia('video')">
                    <i data-lucide="video" style="width:18px; height:18px;"></i> Videos
                </button>
                <button class="filter-btn" onclick="filterMedia('audio')">
                    <i data-lucide="music" style="width:18px; height:18px;"></i> Audio
                </button>
            </div>
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="Search your media library..." onkeyup="searchMedia()">
            </div>
        </div>
        <div id="mediaGrid" class="media-grid">
            <div class="empty-state">
                <i data-lucide="folder-search" style="width: 64px; height: 64px; color: var(--text-muted);"></i>
                <p>Connect to a server to view media files</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Theme Initialization & Toggling
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.body.classList.add('dark-theme');
        }
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const isDark = document.body.classList.contains('dark-theme');
        const iconEl = document.getElementById('themeIcon');
        if (iconEl) {
            iconEl.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateThemeIcon();
    }

    initTheme();
    lucide.createIcons();

    // App Logic
    let currentBaseUrl = '';
    let mediaFiles = [];
    let currentFilter = 'all';
    let currentSearch = '';

    // Web Audio API Context variables
    let audioCtx;
    let gainNode;
    let mediaElementSource;

    async function autoDetectIp() {
        try {
            const hostname = window.location.hostname;
            if (hostname !== 'localhost' && hostname !== '127.0.0.1' && hostname !== '') {
                document.getElementById('serverIp').value = hostname;
                connectToServer();
            } else {
                alert('Please enter your server IP address manually');
            }
        } catch (error) {
            console.error('Auto-detect failed:', error);
        }
    }

    async function connectToServer() {
        const ip = document.getElementById('serverIp').value.trim();
        const port = document.getElementById('serverPort').value.trim();

        if (!ip || !port) {
            alert('Please enter both IP and port');
            return;
        }

        currentBaseUrl = `http://${ip}:${port}`;
        const grid = document.getElementById('mediaGrid');
        grid.innerHTML = '<div class="loading"><i data-lucide="loader-2"></i><p>Connecting to server...</p></div>';
        lucide.createIcons();

        try {
            const response = await fetch(`${currentBaseUrl}/api/media`);
            if (response.ok) {
                mediaFiles = await response.json();
                renderMediaLibrary();
                showConnectionStatus('Connected successfully!', '#10b981', 'check-circle');
                localStorage.setItem('serverIp', ip);
                localStorage.setItem('serverPort', port);
            } else {
                throw new Error('Failed to connect');
            }
        } catch (error) {
            showConnectionStatus('Failed to connect. Make sure server is running.', '#ef4444', 'alert-circle');
            grid.innerHTML = '<div class="empty-state"><i data-lucide="wifi-off"></i><p>Connection failed.</p></div>';
            lucide.createIcons();
        }
    }

    function showConnectionStatus(message, color, icon) {
        const statusDiv = document.getElementById('connectionStatus');
        statusDiv.innerHTML = `<i data-lucide="${icon}" style="width:18px; height:18px;"></i> ${message}`;
        statusDiv.style.color = color;
        lucide.createIcons();
        setTimeout(() => { statusDiv.innerHTML = ''; }, 4000);
    }

    async function renderMediaLibrary() {
        const grid = document.getElementById('mediaGrid');

        if (!mediaFiles || mediaFiles.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i data-lucide="inbox"></i><p>No media files found</p></div>';
            lucide.createIcons();
            return;
        }

        let filtered = mediaFiles;

        if (currentFilter !== 'all') {
            filtered = filtered.filter(media => media.contentType.startsWith(currentFilter + '/'));
        }

        if (currentSearch) {
            filtered = filtered.filter(media => media.title.toLowerCase().includes(currentSearch.toLowerCase()));
        }

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i data-lucide="search-x"></i><p>No media matches your search</p></div>';
            lucide.createIcons();
            return;
        }

        grid.innerHTML = filtered.map(media => {
            const isVideo = media.contentType.startsWith('video/');
            const iconName = isVideo ? 'film' : 'music-4';

            const thumbnailHtml = media.thumbnail
                ? `<img src="${currentBaseUrl}${media.thumbnail}" class="media-thumbnail" alt="Thumbnail" loading="lazy">`
                : `<div class="media-icon-wrapper"><i data-lucide="${iconName}"></i></div>`;

            return `
                <div class="media-card" onclick="playMedia('${escapeHtml(media.filename)}', '${escapeHtml(media.contentType)}')">
                    ${thumbnailHtml}
                    <div class="media-content">
                        <div class="media-title">${escapeHtml(media.title)}</div>
                        <div class="media-meta">
                            <span class="badge"><i data-lucide="hard-drive"></i> ${media.sizeFormatted || 'Unknown'}</span>
                            ${media.resolution ? `<span class="badge"><i data-lucide="monitor"></i> ${media.resolution}</span>` : ''}
                            ${media.bitrate ? `<span class="badge"><i data-lucide="activity"></i> ${Math.round(media.bitrate)} Kbps</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        lucide.createIcons();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function filterMedia(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderMediaLibrary();
    }

    function searchMedia() {
        currentSearch = document.getElementById('searchInput').value;
        renderMediaLibrary();
    }

    function initAudioProcessor(mediaEl) {
        try {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (!gainNode) {
                gainNode = audioCtx.createGain();
                gainNode.connect(audioCtx.destination);
            }

            if (!mediaEl.dataset.processed) {
                mediaElementSource = audioCtx.createMediaElementSource(mediaEl);
                mediaElementSource.connect(gainNode);
                mediaEl.dataset.processed = "true";
            }

            // Reset sliders
            document.getElementById('audioBoost').value = 1;
            document.getElementById('boostValue').innerText = '1x';
            gainNode.gain.value = 1;

        } catch (e) {
            console.warn("Audio Processor init failed (CORS or existing node):", e);
        }
    }

    function changePlaybackSpeed(speed) {
        const player = document.getElementById('mediaPlayer');
        if (player) player.playbackRate = parseFloat(speed);
    }

    function changeAudioBoost(value) {
        document.getElementById('boostValue').innerText = value + 'x';
        if (gainNode) {
            gainNode.gain.value = parseFloat(value);
        }
    }

    function playMedia(filename, contentType) {
        const playerSection = document.getElementById('playerSection');
        const playerContainer = document.getElementById('playerContainer');
        const playerTools = document.getElementById('playerTools');
        const mediaInfo = document.getElementById('mediaInfo');

        playerSection.style.display = 'block';
        playerTools.style.display = 'flex';
        document.getElementById('playbackSpeed').value = "1";

        const streamUrl = `${currentBaseUrl}/api/stream/${encodeURIComponent(filename)}`;
        const sizeInfo = mediaFiles.find(m => m.filename === filename)?.sizeFormatted || 'Unknown';

        if (contentType.startsWith('video/')) {
            playerContainer.innerHTML = `
                <video id="mediaPlayer" controls autoplay crossorigin="anonymous" playsinline>
                    <source src="${streamUrl}" type="${contentType}">
                    Your browser does not support the video tag.
                </video>
            `;
        } else {
            playerContainer.innerHTML = `
                <audio id="mediaPlayer" controls autoplay crossorigin="anonymous">
                    <source src="${streamUrl}" type="${contentType}">
                    Your browser does not support the audio tag.
                </audio>
            `;
        }

        const playerEl = document.getElementById('mediaPlayer');

        playerEl.addEventListener('play', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            initAudioProcessor(playerEl);
        }, { once: true });

        mediaInfo.innerHTML = `
            <div class="info-row">
                <i data-lucide="play" style="color: var(--primary);"></i>
                <strong>Now Playing:</strong> ${escapeHtml(filename)}
            </div>
            <div class="info-row">
                <i data-lucide="hard-drive"></i>
                <span>File Size: ${sizeInfo}</span>
            </div>
            <div class="info-row" style="margin-top: 4px;">
                <a href="${streamUrl}" download="${filename}">
                    <i data-lucide="download"></i> Download Original File
                </a>
            </div>
        `;

        lucide.createIcons();
        playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function loadSavedConfig() {
        const urlParams = new URLSearchParams(window.location.search);
        let savedIp = urlParams.get('server') || localStorage.getItem('serverIp');
        let savedPort = urlParams.get('port') || localStorage.getItem('serverPort');

        if (savedIp) document.getElementById('serverIp').value = savedIp;
        if (savedPort) document.getElementById('serverPort').value = savedPort;

        if (savedIp && savedPort) {
            setTimeout(() => connectToServer(), 300);

            // If there's a file parameter, wait for load then auto-play
            const fileToPlay = urlParams.get('file');
            if (fileToPlay) {
                setTimeout(() => {
                    const media = mediaFiles.find(m => m.filename === fileToPlay);
                    if (media) playMedia(media.filename, media.contentType);
                }, 1000);
            }
        }
    }

    // Event Listeners
    document.getElementById('serverIp').addEventListener('keypress', e => e.key === 'Enter' && connectToServer());
    document.getElementById('serverPort').addEventListener('keypress', e => e.key === 'Enter' && connectToServer());

    loadSavedConfig();
</script>
</body>
</html>
