<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>File Transfer Server</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Core Brand Colors */
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;

            /* Light Theme Variables (Default) */
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --icon-bg: #f1f5f9;
            --badge-bg: #f8fafc;

            /* Shadows & Geometry */
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        /* Dark Theme Variables */
        body.dark-theme {
            --bg-main: #000000;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --icon-bg: #0f172a;
            --badge-bg: #0f172a;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: clamp(16px, 4vw, 40px) clamp(12px, 3vw, 24px);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* --- Header --- */
        .header {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: clamp(24px, 4vw, 32px);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-wrapper i {
            color: var(--primary);
            width: clamp(28px, 5vw, 32px);
            height: clamp(28px, 5vw, 32px);
        }

        h1 {
            font-size: clamp(1.5rem, 3vw, 1.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 24px;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-icon {
            padding: 10px;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--surface-hover);
            border-color: var(--text-muted);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
        }
        .btn-gradient:hover {
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: none;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            white-space: nowrap;
        }

        .tab i { width: 18px; height: 18px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab:hover:not(.active) { color: var(--text-main); }

        /* --- Network Config --- */
        .ip-config {
            background: var(--surface-hover);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .ip-config h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 120px auto auto;
            gap: 12px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        /* --- Stats Grid --- */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stat-number { font-size: 1.75rem; font-weight: 800; color: var(--text-main); }
        .stat-label { color: var(--text-muted); margin-top: 4px; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- File Grid & Animations --- */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .file-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            opacity: 0;
            animation: slideUpFade 0.4s ease forwards;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--text-muted);
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .file-icon-wrapper {
            background: var(--icon-bg);
            padding: 12px;
            border-radius: 10px;
            color: var(--primary);
        }

        .file-type-badge {
            background: var(--badge-bg);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border);
        }

        .file-name {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            word-break: break-all;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .file-details {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .file-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            background: var(--surface-hover);
            color: var(--text-main);
        }

        .action-btn i { width: 16px; height: 16px; }

        .action-download { border-color: var(--border); }
        .action-download:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .action-delete { border-color: var(--border); }
        .action-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* --- Upload Area --- */
        .upload-area {
            border: 2px dashed var(--text-muted);
            border-radius: var(--radius-lg);
            padding: clamp(40px, 8vw, 80px) 20px;
            text-align: center;
            background: var(--surface);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .upload-area.drag-over { border-color: var(--primary); background: var(--surface-hover); }
        .upload-area i { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }

        .upload-item {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 16px;
            display: grid;
            grid-template-columns: minmax(120px, 1.5fr) 2fr minmax(100px, auto);
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .progress-bar { width: 100%; height: 6px; background: var(--surface-hover); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.3s ease; }

        /* --- Utilities --- */
        .loading, .empty-state {
            text-align: center;
            padding: clamp(40px, 8vw, 80px) 20px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border);
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            border: 3px solid var(--surface-hover);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            font-size: 0.9rem;
        }

        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 820px) {
            .header-top { flex-direction: column; align-items: stretch; }
            .header-actions { justify-content: flex-start; }
            .input-group { grid-template-columns: 1fr; }
            .input-group .btn { width: 100%; }
        }

        @media (max-width: 540px) {
            .upload-item { grid-template-columns: 1fr; gap: 12px; }
            .header-actions { grid-template-columns: auto 1fr auto; display: grid; }
            .media-btn { grid-column: span 3; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="title-wrapper">
                <i data-lucide="server"></i>
                <h1>File Transfer Server</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-icon" onclick="toggleTheme()" title="Toggle Theme">
                    <i data-lucide="moon" id="themeIcon"></i>
                </button>
                <a href="player.html" target="_blank" class="btn btn-gradient media-btn" title="Open Media Player in a new tab">
                    <i data-lucide="play-circle"></i> Media Player
                </a>
                <button class="btn btn-outline btn-icon" onclick="openHelp()" title="Help">
                    <i data-lucide="help-circle"></i>
                </button>
            </div>
        </div>
        <p class="subtitle">Manage files effortlessly on your local network.</p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('browse')">
                <i data-lucide="folder"></i> Browse Files
            </button>
            <button class="tab" onclick="switchTab('upload')">
                <i data-lucide="upload"></i> Upload Files
            </button>
        </div>

        <div class="ip-config">
            <h3><i data-lucide="network"></i> Connection Details</h3>
            <div class="input-group">
                <input type="text" id="serverIp" placeholder="Server IP (e.g. 192.168.1.5)" />
                <input type="number" id="serverPort" placeholder="Port" value="9090" />
                <button class="btn btn-primary" onclick="connectToServer()">
                    <i data-lucide="plug"></i> Connect
                </button>
                <button class="btn btn-outline" onclick="detectServerIp()">
                    <i data-lucide="scan"></i> Auto Detect
                </button>
            </div>
        </div>

        <div class="stats" id="stats" style="display: none">
            <div class="stat-card">
                <div class="stat-number" id="totalFiles">0</div>
                <div class="stat-label">Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSize">0</div>
                <div class="stat-label">Total Size</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="fileTypes">0</div>
                <div class="stat-label">Formats</div>
            </div>
        </div>
    </div>

    <div id="browseTab">
        <div id="fileContainer">
            <div class="empty-state">
                <i data-lucide="hard-drive" style="width: 48px; height: 48px; color: var(--text-muted)"></i>
                <p>Connect to the server to view your files.</p>
            </div>
        </div>
    </div>

    <div id="uploadTab" style="display: none">
        <div class="upload-area" id="uploadArea">
            <i data-lucide="upload-cloud"></i>
            <p style="font-weight: 600; font-size: 1.1rem; color: var(--text-main);">Click or drag files here</p>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">Supports all file types up to 1GB</p>
            <input type="file" id="fileInput" multiple style="display: none"/>
        </div>
        <div id="uploadList"></div>
    </div>
</div>

<script>
    // Initialize Theme
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.body.classList.add('dark-theme');
            document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
        }
        lucide.createIcons();
    }

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('dark-theme');
        const isDark = body.classList.contains('dark-theme');

        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    initTheme();

    let currentBaseUrl = "";
    let currentTab = "browse";

    function openHelp() {
        alert(
            "File Transfer Server - Help\n\n" +
            "1. Connect: Enter your computer's IP address and port, then click Connect.\n" +
            "2. Browse: View, download, and delete files stored on the server.\n" +
            "3. Upload: Add new files via drag-and-drop.\n" +
            "4. Media Player: Open the dedicated streaming UI in a new tab.\n" +
            "5. Access: Share http://[YOUR-IP]:9090 with devices on the same Wi-Fi."
        );
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        document.getElementById("browseTab").style.display = tab === "browse" ? "block" : "none";
        document.getElementById("uploadTab").style.display = tab === "upload" ? "block" : "none";
        document.getElementById("stats").style.display = tab === "browse" && currentBaseUrl ? "grid" : "none";
    }

    async function detectServerIp() {
        try {
            const hostname = new URL(window.location.href).hostname;
            const port = new URL(window.location.href).port || "9090";

            if (hostname !== "localhost" && hostname !== "127.0.0.1" && hostname !== "") {
                document.getElementById("serverIp").value = hostname;
                document.getElementById("serverPort").value = port;
                connectToServer();
            } else {
                const response = await fetch("https://api.ipify.org?format=json");
                const data = await response.json();
                document.getElementById("serverIp").value = data.ip;
                connectToServer();
            }
        } catch (error) {
            document.getElementById("serverIp").value = "localhost";
            connectToServer();
        }
    }

    function getFileIcon(filename) {
        const ext = filename.split(".").pop().toLowerCase();
        let icon = "file";
        if (["mp4", "mkv", "avi", "mov"].includes(ext)) icon = "video";
        else if (["mp3", "wav", "flac"].includes(ext)) icon = "music";
        else if (["jpg", "jpeg", "png", "gif"].includes(ext)) icon = "image";
        else if (["pdf", "doc", "docx", "txt"].includes(ext)) icon = "file-text";
        else if (["zip", "rar", "7z"].includes(ext)) icon = "archive";
        return `<i data-lucide="${icon}" style="width: 32px; height: 32px;"></i>`;
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString() + " " + date.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
    }

    function getFileType(filename) {
        return filename.split(".").pop().toLowerCase() || "unknown";
    }

    function showToast(message, type = "info") {
        const toast = document.createElement("div");
        toast.className = "toast";
        const icon = type === "success" ? "check-circle" : type === "error" ? "alert-circle" : "info";
        const color = type === "success" ? "#10b981" : type === "error" ? "#ef4444" : "#60a5fa";
        toast.innerHTML = `<i data-lucide="${icon}" style="color: ${color}"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        lucide.createIcons();
        setTimeout(() => toast.remove(), 3000);
    }

    async function deleteFile(filename) {
        if (!confirm(`Permanently delete "${filename}"?`)) return;
        try {
            const response = await fetch(`${currentBaseUrl}/api/files/${encodeURIComponent(filename)}`, { method: "DELETE" });
            if (response.ok) {
                showToast("File deleted", "success");
                await fetchFiles();
            } else throw new Error();
        } catch (error) {
            showToast("Failed to delete file", "error");
        }
    }

    function downloadFile(filename) {
        window.open(`${currentBaseUrl}/api/files/${encodeURIComponent(filename)}`, "_blank");
        showToast("Starting download...", "info");
    }

    function renderFiles(files) {
        const container = document.getElementById("fileContainer");
        const statsDiv = document.getElementById("stats");

        if (!files || files.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i data-lucide="inbox" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                    <p style="font-weight: 600; color: var(--text-main);">Folder is empty</p>
                </div>`;
            statsDiv.style.display = "none";
            lucide.createIcons();
            return;
        }

        document.getElementById("totalFiles").textContent = files.length;
        document.getElementById("totalSize").textContent = formatFileSize(files.reduce((sum, file) => sum + file.size, 0));
        document.getElementById("fileTypes").textContent = new Set(files.map((f) => getFileType(f.filename))).size;
        statsDiv.style.display = "grid";

        container.innerHTML = `<div class="file-grid">${files.map((file, index) => `
            <div class="file-card" style="animation-delay: ${index * 0.05}s">
                <div class="file-header">
                    <div class="file-icon-wrapper">${getFileIcon(file.filename)}</div>
                    <span class="file-type-badge">${getFileType(file.filename)}</span>
                </div>
                <div class="file-name" title="${file.filename}">
                    ${file.filename.length > 40 ? file.filename.substring(0, 37) + "..." : file.filename}
                </div>
                <div class="file-details">
                    <div class="detail-item">
                        <i data-lucide="hard-drive"></i> ${file.sizeFormatted || formatFileSize(file.size)}
                    </div>
                    <div class="detail-item">
                        <i data-lucide="calendar"></i> ${formatDate(file.lastModified)}
                    </div>
                </div>
                <div class="file-actions">
                    <button class="action-btn action-download" onclick="downloadFile('${escapeHtml(file.filename)}')">
                        <i data-lucide="download"></i> Download
                    </button>
                    <button class="action-btn action-delete" onclick="deleteFile('${escapeHtml(file.filename)}')">
                        <i data-lucide="trash-2"></i> Delete
                    </button>
                </div>
            </div>
        `).join("")}</div>`;

        lucide.createIcons();
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append("file", file);
        const uploadId = Date.now() + "-" + Math.random().toString(36).substr(2, 6);

        document.getElementById("uploadList").insertAdjacentHTML("afterbegin", `
            <div class="upload-item" id="upload-${uploadId}">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; color: var(--text-main);">${escapeHtml(file.name)}</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">${formatFileSize(file.size)}</div>
                </div>
                <div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-${uploadId}"></div></div>
                </div>
                <div id="status-${uploadId}" style="display:flex; justify-content:flex-end; font-size:0.85rem; color:var(--text-muted);">
                    Uploading...
                </div>
            </div>
        `);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", `${currentBaseUrl}/api/files/upload`);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                const bar = document.getElementById(`progress-${uploadId}`);
                if (bar) bar.style.width = `${percent}%`;
            }
        };

        xhr.onload = () => {
            const status = document.getElementById(`status-${uploadId}`);
            if (xhr.status === 200) {
                if (status) { status.innerHTML = 'Complete'; status.style.color = '#10b981'; }
                if (currentTab === "browse") fetchFiles();
            } else {
                if (status) { status.innerHTML = 'Failed'; status.style.color = '#ef4444'; }
            }
        };

        xhr.onerror = () => {
            const status = document.getElementById(`status-${uploadId}`);
            if (status) { status.innerHTML = 'Error'; status.style.color = '#ef4444'; }
        };

        xhr.send(formData);
    }

    function handleFileSelect(files) { Array.from(files).forEach(uploadFile); }

    async function fetchFiles() {
        if (!currentBaseUrl) return;
        const container = document.getElementById("fileContainer");
        container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Syncing files...</p></div>`;

        try {
            const response = await fetch(`${currentBaseUrl}/api/files`);
            if (!response.ok) throw new Error();
            renderFiles(await response.json());
        } catch (error) {
            container.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">Connection failed. Check server IP.</p></div>`;
            document.getElementById("stats").style.display = "none";
        }
    }

    function connectToServer() {
        const ip = document.getElementById("serverIp").value.trim();
        const port = document.getElementById("serverPort").value.trim();
        if (!ip || !port) return alert("Enter IP and port");

        currentBaseUrl = `http://${ip}:${port}`;
        localStorage.setItem("serverIp", ip);
        localStorage.setItem("serverPort", port);
        fetchFiles();
        showToast("Connecting...");
    }

    function loadSavedConfig() {
        const savedIp = localStorage.getItem("serverIp");
        const savedPort = localStorage.getItem("serverPort");
        if (savedIp) document.getElementById("serverIp").value = savedIp;
        if (savedPort) document.getElementById("serverPort").value = savedPort;
        if (savedIp && savedPort) setTimeout(connectToServer, 300);
    }

    // Drag and Drop Listeners
    const uploadArea = document.getElementById("uploadArea");
    const fileInput = document.getElementById("fileInput");

    uploadArea.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => handleFileSelect(e.target.files));
    uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("drag-over"); });
    uploadArea.addEventListener("dragleave", (e) => { e.preventDefault(); uploadArea.classList.remove("drag-over"); });
    uploadArea.addEventListener("drop", (e) => { e.preventDefault(); uploadArea.classList.remove("drag-over"); handleFileSelect(e.dataTransfer.files); });

    document.getElementById("serverIp").addEventListener("keypress", (e) => e.key === "Enter" && connectToServer());
    document.getElementById("serverPort").addEventListener("keypress", (e) => e.key === "Enter" && connectToServer());

    loadSavedConfig();
</script>
</body>
</html>
