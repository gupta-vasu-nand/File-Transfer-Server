<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>File Transfer Server - File Manager</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --gradient-primary: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
            --gradient-hover: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-main: #f8fafc;
            --bg-secondary: #f1f5f9;
            --surface: #ffffff;
            --surface-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.08);
            --shadow-glow: 0 4px 14px rgba(249, 115, 22, 0.2);
            --radius-md: 12px;
            --radius-lg: 16px;
            --folder-color: #f97316;
            --video-color: #ef4444;
            --audio-color: #10b981;
            --image-color: #3b82f6;
            --doc-color: #8b5cf6;
            --code-color: #06b6d4;
            --animation-timing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.dark-theme {
            --bg-main: #000000;
            --bg-secondary: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #222222;
            --input-bg: #000000;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
            --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.7);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        .sidebar-header, .sidebar-scrollable {
            width: 320px;
            flex-shrink: 0;
        }

        .sidebar-scrollable {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .sidebar-title {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .connection-panel {
            background: var(--surface);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-top: 1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .connection-panel:hover {
            box-shadow: var(--shadow-lg);
        }

        .connection-panel input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }

        .connection-panel input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .connection-panel button {
            width: 100%;
            padding: 0.75rem;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: var(--shadow-glow);
        }

        .connection-panel button:hover {
            background: var(--gradient-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
        }

        .stats-section {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stats-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card.full-width {
            grid-column: 1 / -1;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--primary);
        }

        .upload-area {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }

        #uploadInput {
            display: none;
        }

        .upload-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface);
            color: var(--primary);
            border: 2px dashed var(--primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: var(--gradient-primary);
            color: white;
            border-style: solid;
            box-shadow: var(--shadow-glow);
            transform: scale(1.02);
        }

        .category-buttons {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .category-buttons h4 {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .category-btn {
            padding: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: var(--surface-hover);
            color: var(--text-main);
            transform: translateY(-1px);
        }

        .category-btn.active {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-glow);
        }

        .folder-tree {
            flex: 1;
            padding: 1rem;
            padding-bottom: 3rem;
        }

        .tree-item {
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .tree-item:hover {
            background: var(--bg-secondary);
            color: var(--text-main);
            padding-left: 1.2rem;
        }

        .tree-item.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .toolbar {
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            z-index: 10;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-secondary);
            transform: scale(1.05);
        }

        .toolbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-right: 0.5rem;
            white-space: nowrap;
        }

        @media (min-width: 901px) {
            .sidebar:not(.collapsed) + .main-content .toolbar-brand {
                display: none;
            }
        }

        .search-container {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .search-box .lucide-search {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        /* Search Suggestions Dropdown */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-top: 6px;
            box-shadow: var(--shadow-lg);
            z-index: 200;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .search-suggestion-item {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            transition: background 0.2s, padding-left 0.2s;
            font-size: 0.9rem;
        }

        .search-suggestion-item:last-child {
            border-bottom: none;
        }

        .search-suggestion-item:hover {
            background: var(--bg-secondary);
            padding-left: 1.5rem;
            color: var(--primary);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .filter-buttons::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .filter-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: var(--gradient-primary);
            color: white;
            border: none;
            box-shadow: var(--shadow-glow);
        }

        .icon-btn {
            padding: 0.6rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: var(--surface);
            color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .breadcrumb {
            padding: 0.75rem 1.5rem;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .breadcrumb-item {
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover {
            color: var(--primary);
        }

        .breadcrumb-item.active {
            color: var(--text-main);
            font-weight: 700;
            pointer-events: none;
        }

        .file-grid {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            align-content: start;
        }

        .file-grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Upgraded Animations */
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(15px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 1rem;
            transition: all 0.3s var(--animation-timing);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            cursor: pointer;
            opacity: 0;
            animation: fadeInScale 0.5s var(--animation-timing) forwards;
        }

        .file-grid.list-view .file-card {
            flex-direction: row;
            text-align: left;
            padding: 1rem;
            gap: 1rem;
        }

        .file-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
            z-index: 2;
        }

        .file-grid.list-view .file-card:hover {
            transform: translateY(-2px) scale(1.01);
        }

        .file-card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s;
        }

        .file-card:hover .file-card-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .file-grid.list-view .file-card-actions {
            position: relative;
            opacity: 1;
            top: 0;
            right: 0;
            transform: none;
            margin-left: auto;
            order: 3;
        }

        .action-btn {
            padding: 0.4rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--surface);
            color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .action-btn.delete:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .file-icon-wrapper {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: all 0.4s var(--animation-timing);
        }

        .file-card:hover .file-icon-wrapper {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: scale(1.1) rotate(-3deg);
        }

        .file-grid.list-view .file-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .file-icon-wrapper .lucide {
            width: 36px;
            height: 36px;
            transition: transform 0.3s;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .file-grid.list-view .file-info {
            align-items: flex-start;
            overflow: hidden;
        }

        .file-name {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1rem;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
            margin-bottom: 6px;
            transition: color 0.2s;
        }

        .file-card:hover .file-name {
            color: var(--primary);
        }

        .file-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .badge {
            background: var(--bg-main);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .play-btn {
            width: 100%;
            margin-top: auto;
            padding: 0.6rem;
            background: var(--bg-secondary);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .play-btn:hover {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border);
            animation: fadeInScale 0.5s ease forwards;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 320px;
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
                border-right: none;
            }

            .sidebar.open {
                left: 0;
            }

            .mobile-overlay.active {
                display: block;
                opacity: 1;
            }

            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                padding: 1rem;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title" style="margin-bottom: 1rem;"><i data-lucide="server"></i><span>File Manager</span>
            </h1>
            <div class="connection-panel">
                <input type="text" id="serverIp" placeholder="Server IP" value="localhost">
                <input type="number" id="serverPort" placeholder="Port" value="9090">
                <button onclick="connectToServer()"><i data-lucide="plug"></i> <span>Connect Server</span></button>
                <button onclick="autoDetectIp()"
                        style="background: var(--bg-secondary); color: var(--text-main); box-shadow: none; border: 1px solid var(--border);">
                    <i data-lucide="scan"></i> <span>Auto Detect</span>
                </button>
            </div>
        </div>

        <div class="sidebar-scrollable">
            <div class="stats-section">
                <div class="stats-title"><i data-lucide="folder"></i><span>Current Folder</span></div>
                <div class="stats-dashboard">
                    <div class="stat-card">
                        <div class="stat-label">Files</div>
                        <div class="stat-value" id="folderFileCount"><i data-lucide="file"></i> -</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Folders</div>
                        <div class="stat-value" id="folderCount"><i data-lucide="folder"></i> -</div>
                    </div>
                    <div class="stat-card full-width">
                        <div class="stat-label">Total Size</div>
                        <div class="stat-value" id="folderTotalSize"><i data-lucide="hard-drive"></i> -</div>
                    </div>
                </div>
            </div>

            <div class="category-buttons">
                <h4><i data-lucide="folder-tree"></i> Quick Access</h4>
                <div class="category-grid">
                    <button class="category-btn" onclick="navigateTo('Videos')"><i data-lucide="video"></i> Videos
                    </button>
                    <button class="category-btn" onclick="navigateTo('Audio')"><i data-lucide="music"></i> Audio
                    </button>
                    <button class="category-btn" onclick="navigateTo('Images')"><i data-lucide="image"></i> Images
                    </button>
                    <button class="category-btn" onclick="navigateTo('Documents')"><i data-lucide="file-text"></i> Docs
                    </button>
                    <button class="category-btn" onclick="navigateTo('Code')"><i data-lucide="code"></i> Code</button>
                    <button class="category-btn" onclick="navigateTo('Others')"><i data-lucide="file"></i> Others
                    </button>
                </div>
            </div>

            <div class="stats-section">
                <div class="stats-title"><i data-lucide="server"></i><span>System Storage</span></div>
                <div class="stats-dashboard">
                    <div class="stat-card full-width">
                        <div class="stat-label">Used Space</div>
                        <div class="stat-value" id="storageUsed"><i data-lucide="gauge"></i> -</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Files</div>
                        <div class="stat-value" id="globalFileCount"><i data-lucide="database"></i> -</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Size</div>
                        <div class="stat-value" id="globalTotalSize"><i data-lucide="hard-drive"></i> -</div>
                    </div>
                </div>
            </div>

            <div class="upload-area">
                <input type="file" id="uploadInput" multiple onchange="uploadFiles()">
                <button class="upload-btn" onclick="document.getElementById('uploadInput').click()">
                    <i data-lucide="upload-cloud"></i> <span>Upload Files</span>
                </button>
            </div>

            <div class="folder-tree" id="folderTree">
                <div class="tree-item active" onclick="navigateTo('')"><i data-lucide="folder-root"></i> <span>Root Directory</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <button class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <div class="toolbar-brand" id="toolbarBrand"><i data-lucide="server"></i><span>File Manager</span></div>

            <div class="search-container">
                <div class="search-box">
                    <i data-lucide="search" class="lucide-search"></i>
                    <input type="text" id="searchInput" placeholder="Search files..." oninput="handleSearch()"
                           autocomplete="off">
                </div>
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterFiles('all')"><i data-lucide="grid"></i> All</button>
                <button class="filter-btn" onclick="filterFiles('video')"><i data-lucide="video"></i> Video</button>
                <button class="filter-btn" onclick="filterFiles('audio')"><i data-lucide="music"></i> Audio</button>
                <button class="filter-btn" onclick="filterFiles('image')"><i data-lucide="image"></i> Image</button>
                <button class="filter-btn" onclick="filterFiles('document')"><i data-lucide="file-text"></i> Docs
                </button>
                <button class="filter-btn" onclick="filterFiles('folder')"><i data-lucide="folder"></i> Folders</button>
            </div>
            <button class="icon-btn" onclick="toggleView()" title="Toggle Grid/List"><i data-lucide="layout-list"
                                                                                        id="viewIcon"></i></button>
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme"><i data-lucide="moon"
                                                                                     id="themeIcon"></i></button>
        </div>

        <div class="breadcrumb" id="breadcrumb"><span class="breadcrumb-item active"><i
                data-lucide="home"></i> Root</span></div>
        <div class="file-grid" id="fileGrid">
            <div class="empty-state"><i data-lucide="server-off"
                                        style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 10px;"></i>
                <p style="font-weight: 600; font-size: 1.1rem; color: var(--text-main);">No Server Connected</p>
                <p style="font-size: 0.9rem;">Connect your local server to view files.</p></div>
        </div>
    </div>
</div>

<script>
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') document.body.classList.add('dark-theme');
        updateThemeIcon();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const iconEl = document.getElementById('themeIcon');
        if (iconEl) {
            iconEl.setAttribute('data-lucide', document.body.classList.contains('dark-theme') ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 900) {
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    initTheme();
    lucide.createIcons();

    let currentBaseUrl = '';
    let currentPath = '';
    let currentFilter = 'all';
    let currentSearch = '';
    let allItems = [];
    let isGridView = true;
    let currentFolderStats = {fileCount: 0, folderCount: 0, totalSize: 0};

    async function autoDetectIp() {
        const hostname = window.location.hostname;
        if (hostname !== 'localhost' && hostname !== '127.0.0.1' && hostname !== '') {
            document.getElementById('serverIp').value = hostname;
            connectToServer();
        } else {
            document.getElementById('serverIp').value = 'localhost';
            connectToServer();
        }
    }

    async function connectToServer() {
        const ip = document.getElementById('serverIp').value.trim();
        const port = document.getElementById('serverPort').value.trim();
        if (!ip || !port) return alert('Enter IP and port');
        currentBaseUrl = `http://${ip}:${port}`;
        localStorage.setItem('serverIp', ip);
        localStorage.setItem('serverPort', port);
        if (window.innerWidth <= 900) toggleSidebar();
        document.getElementById('fileGrid').innerHTML = '<div class="empty-state"><i data-lucide="loader-2" class="spinner" style="width: 48px; height: 48px; color: var(--primary);"></i><p>Connecting...</p></div>';
        lucide.createIcons();
        await loadContents();
        await loadGlobalStats();
        await loadFolderTree();
    }

    async function loadContents() {
        try {
            const url = `${currentBaseUrl}/api/folders/contents?path=${encodeURIComponent(currentPath)}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            allItems = [...data.folders.map(f => ({...f, isDirectory: true})), ...data.files];
            currentFolderStats = {
                fileCount: data.fileCount || data.files?.length || 0,
                folderCount: data.folderCount || data.folders?.length || 0,
                totalSize: data.totalSize || 0
            };
            updateFolderStats();
            displayFiles(allItems);
            updateBreadcrumb(data.currentPath);
        } catch (error) {
            console.error('Load contents error:', error);
            document.getElementById('fileGrid').innerHTML = '<div class="empty-state"><i data-lucide="alert-triangle" style="width: 48px; height: 48px; color: var(--danger);"></i><p>Connection failed. Check server status and folder path.</p></div>';
            lucide.createIcons();
        }
    }

    function updateFolderStats() {
        document.getElementById('folderFileCount').innerHTML = `<i data-lucide="file"></i> ${currentFolderStats.fileCount}`;
        document.getElementById('folderCount').innerHTML = `<i data-lucide="folder"></i> ${currentFolderStats.folderCount}`;
        document.getElementById('folderTotalSize').innerHTML = `<i data-lucide="hard-drive"></i> ${formatFileSize(currentFolderStats.totalSize)}`;
        lucide.createIcons();
    }

    async function loadGlobalStats() {
        try {
            const [sysRes, filesRes] = await Promise.all([fetch(`${currentBaseUrl}/api/system/info`), fetch(`${currentBaseUrl}/api/files`)]);
            const sys = await sysRes.json();
            const files = await filesRes.json();
            const totalSize = files.reduce((sum, f) => sum + (f.size || 0), 0);
            document.getElementById('storageUsed').innerHTML = `<i data-lucide="gauge"></i> ${sys.usedSpaceFormatted} (${sys.usagePercentage}%)`;
            document.getElementById('globalFileCount').innerHTML = `<i data-lucide="database"></i> ${files.length}`;
            document.getElementById('globalTotalSize').innerHTML = `<i data-lucide="hard-drive"></i> ${formatFileSize(totalSize)}`;
            lucide.createIcons();
        } catch (e) {
            console.error('Failed to load global stats:', e);
        }
    }

    function displayFiles(items) {
        let filtered = items;
        if (currentSearch) filtered = filtered.filter(item => (item.name || item.filename).toLowerCase().includes(currentSearch.toLowerCase()));
        if (currentFilter !== 'all') {
            filtered = filtered.filter(item => {
                if (item.isDirectory) return currentFilter === 'folder';
                const ct = item.contentType || '';
                if (currentFilter === 'video') return ct.startsWith('video/');
                if (currentFilter === 'audio') return ct.startsWith('audio/');
                if (currentFilter === 'image') return ct.startsWith('image/');
                if (currentFilter === 'document') return ct === 'application/pdf' || ct.includes('text');
                return false;
            });
        }

        const grid = document.getElementById('fileGrid');
        grid.className = isGridView ? 'file-grid' : 'file-grid list-view';
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i data-lucide="search-x" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom:10px;"></i><p style="font-weight: 600;">No files found matching criteria</p></div>';
            lucide.createIcons();
            return;
        }

        grid.innerHTML = filtered.map((item, index) => `
            <div class="file-card" style="animation-delay: ${Math.min(index * 0.05, 0.4)}s" onclick="handleItemClick(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                ${!item.isDirectory ? `<div class="file-card-actions">
                    <button class="action-btn" title="Download" onclick="event.stopPropagation(); downloadFile('${escapeHtml(item.path || item.filename).replace(/'/g, "\\'")}')"><i data-lucide="download"></i></button>
                    <button class="action-btn delete" title="Delete" onclick="event.stopPropagation(); deleteFile('${escapeHtml(item.path || item.filename).replace(/'/g, "\\'")}')"><i data-lucide="trash-2"></i></button>
                </div>` : '<div class="file-card-actions"></div>'}
                <div class="file-icon-wrapper">${getFileIcon(item)}</div>
                <div class="file-info">
                    <div class="file-name" title="${escapeHtml(item.name || item.filename)}">${escapeHtml(item.name || item.filename)}</div>
                    <div class="file-meta">
                        ${!item.isDirectory ? `<span class="badge"><i data-lucide="hard-drive"></i> ${formatFileSize(item.size)}</span>` : ''}
                        ${item.lastModified ? `<span class="badge"><i data-lucide="calendar"></i> ${formatDate(item.lastModified)}</span>` : ''}
                    </div>
                </div>
                ${!item.isDirectory ? `<button class="play-btn" onclick="event.stopPropagation(); playFile('${escapeHtml(item.path || item.filename).replace(/'/g, "\\'")}', '${item.contentType || ''}', '${escapeHtml(item.name || item.filename).replace(/'/g, "\\'")}', ${item.size || 0})"><i data-lucide="play"></i> <span class="btn-text">Open</span></button>` : ''}
            </div>
        `).join('');
        lucide.createIcons();
    }

    function playFile(path, contentType, name, size) {
        // Don't double-encode the path - use it as is
        const params = new URLSearchParams({
            file: path,  // This already includes folder structure like "Audio/filename.mp3"
            baseUrl: currentBaseUrl,
            type: contentType,
            name: name,
            size: size,
            currentFolder: currentPath
        });

        // Changed '_blank' to '_self' to open in the same tab
        window.open(`player.html?${params.toString()}`, '_self');
    }

    function handleItemClick(item) {
        if (item.isDirectory) {
            navigateTo(item.path);
        } else {
            // Use the full path from the item
            const fullPath = item.path || item.filename;
            playFile(fullPath, item.contentType || '', item.name || item.filename, item.size);
        }
    }

    async function deleteFile(path) {
        if (!confirm('Permanently delete this file?')) return;
        try {
            const response = await fetch(`${currentBaseUrl}/api/files/${encodeURIComponent(path)}`, {method: 'DELETE'});
            if (response.ok) {
                await loadContents();
                await loadGlobalStats();
            }
        } catch (error) {
            alert('Delete failed');
        }
    }

    function downloadFile(path) {
        window.open(`${currentBaseUrl}/api/files/${encodeURIComponent(path)}`, '_blank');
    }

    async function uploadFiles() {
        const files = document.getElementById('uploadInput').files;
        if (!files.length) return;
        const btn = document.querySelector('.upload-btn');
        const ogText = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="loader" class="spinner"></i> <span>Uploading...</span>';
        lucide.createIcons();
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);
            if (currentPath) formData.append('path', currentPath);
            try {
                await fetch(`${currentBaseUrl}/api/files/upload`, {method: 'POST', body: formData});
            } catch (error) {
                console.error('Upload failed:', file.name);
            }
        }
        btn.innerHTML = ogText;
        lucide.createIcons();
        document.getElementById('uploadInput').value = '';
        await loadContents();
        await loadGlobalStats();
    }

    function navigateTo(path) {
        currentPath = path || '';
        document.getElementById('searchInput').value = '';
        currentSearch = '';
        loadContents();
        loadFolderTree();
    }

    function updateBreadcrumb(path) {
        const parts = path.split('/').filter(p => p);
        const breadcrumb = document.getElementById('breadcrumb');
        let html = `<span class="breadcrumb-item ${parts.length === 0 ? 'active' : ''}" onclick="navigateTo('')"><i data-lucide="home"></i> Root</span>`;
        parts.forEach((part, i) => {
            const isLast = i === parts.length - 1;
            html += `<i data-lucide="chevron-right" style="color:var(--text-muted); width:16px;"></i><span class="breadcrumb-item ${isLast ? 'active' : ''}" onclick="navigateTo('${parts.slice(0, i + 1).join('/')}')">${escapeHtml(part)}</span>`;
        });
        breadcrumb.innerHTML = html;
        lucide.createIcons();
    }

    function filterFiles(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        displayFiles(allItems);
    }

    // Interactive Search with Suggestions
    function handleSearch() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        const suggestionsBox = document.getElementById('searchSuggestions');

        if (currentSearch.length > 0) {
            const matches = allItems.filter(item => (item.name || item.filename).toLowerCase().includes(currentSearch)).slice(0, 5);

            if (matches.length > 0) {
                suggestionsBox.innerHTML = matches.map(m => `
                    <div class="search-suggestion-item" onclick="selectSuggestion('${escapeHtml((m.name || m.filename).replace(/'/g, "\\'"))}')">
                        ${getFileIcon(m)}
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(m.name || m.filename)}</span>
                    </div>
                `).join('');
                lucide.createIcons();
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        } else {
            suggestionsBox.style.display = 'none';
        }

        displayFiles(allItems);
    }

    function selectSuggestion(name) {
        document.getElementById('searchInput').value = name;
        currentSearch = name.toLowerCase();
        document.getElementById('searchSuggestions').style.display = 'none';
        displayFiles(allItems);
    }

    // Close suggestions dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            const box = document.getElementById('searchSuggestions');
            if (box) box.style.display = 'none';
        }
    });

    function toggleView() {
        isGridView = !isGridView;
        document.getElementById('viewIcon').setAttribute('data-lucide', isGridView ? 'layout-list' : 'layout-grid');
        lucide.createIcons();
        displayFiles(allItems);
    }

    async function loadFolderTree() {
        try {
            const response = await fetch(`${currentBaseUrl}/api/folders/tree`);
            const folders = await response.json();
            const tree = document.getElementById('folderTree');
            let html = `<div class="tree-item ${currentPath === '' ? 'active' : ''}" onclick="navigateTo('')"><i data-lucide="folder-root"></i> <span>Root Directory</span></div>`;
            const buildTree = (items, depth = 1) => {
                items.forEach(f => {
                    const margin = depth * 0.75;
                    html += `<div class="tree-item ${currentPath === f.path ? 'active' : ''}" onclick="navigateTo('${f.path}')" style="margin-left:${margin}rem"><i data-lucide="folder"></i> <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(f.name)}</span><span style="font-size:0.7rem; margin-left:auto;">${f.fileCount}</span></div>`;
                    if (f.children) buildTree(f.children, depth + 1);
                });
            };
            buildTree(folders);
            tree.innerHTML = html;
            lucide.createIcons();
        } catch (e) {
            console.error('Failed to load folder tree:', e);
        }
    }

    function getFileIcon(item) {
        if (item.isDirectory) return '<i data-lucide="folder" style="color: var(--folder-color);"></i>';
        const ct = item.contentType || '';
        if (ct.startsWith('video/')) return '<i data-lucide="film" style="color: var(--video-color);"></i>';
        if (ct.startsWith('audio/')) return '<i data-lucide="music-4" style="color: var(--audio-color);"></i>';
        if (ct.startsWith('image/')) return '<i data-lucide="image" style="color: var(--image-color);"></i>';
        if (ct === 'application/pdf') return '<i data-lucide="file-text" style="color: var(--doc-color);"></i>';
        return '<i data-lucide="file"></i>';
    }

    function formatFileSize(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return `${(bytes / Math.pow(1024, i)).toFixed(1)} ${units[i]}`;
    }

    function formatDate(date) {
        return new Date(date).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    const savedIp = localStorage.getItem('serverIp');
    const savedPort = localStorage.getItem('serverPort');
    if (savedIp) document.getElementById('serverIp').value = savedIp;
    if (savedPort) document.getElementById('serverPort').value = savedPort;
    if (savedIp && savedPort) setTimeout(connectToServer, 500);

    setInterval(() => {
        if (currentBaseUrl) {
            loadGlobalStats();
            loadFolderTree();
            if (currentPath !== undefined) loadContents();
        }
    }, 30000);
</script>
</body>
</html>
